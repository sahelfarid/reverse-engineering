{% extends "base.html" %}
{% block title %}Login — ADB Device Manager{% endblock %}
{% block body %}
<div class="login-screen">
  <form id="login-form" class="login-card" autocomplete="off">
    <h1>ADB Device Manager</h1>
    <p class="muted">Sign in with your panel password.</p>
    <input type="password" id="login-password" name="password" placeholder="Password" autofocus required>
    <label class="muted" style="display:flex; align-items:center; gap:6px;">
      <input type="checkbox" id="login-remember"> Remember me on this device
    </label>
    <button type="submit">Sign in</button>
    <p id="login-error" class="error-text" hidden></p>
    <p class="muted" style="text-align:center; margin:0;">
      <a href="#" id="login-reset-link">Forgot password? Reset</a>
    </p>
  </form>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
// Defensive self-check: if a password isn't actually required (skipped during
// setup) or this session is already authenticated, this form is stale --
// e.g. restored from the browser's back/forward cache after a reset or a
// login elsewhere -- so bounce straight to the dashboard instead of showing
// a login form that (with no password set) could never be submitted anyway.
(async () => {
  try {
    const res = await fetch('/api/auth/status');
    const data = await res.json();
    if (!data.setup_complete || data.authenticated) {
      window.location.replace('/');
    }
  } catch (err) { /* stay on the login form if the check itself fails */ }
})();

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('login-password').value;
  const remember = document.getElementById('login-remember').checked;
  const errEl = document.getElementById('login-error');
  errEl.hidden = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password, remember}),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = 'Incorrect password.';
      errEl.hidden = false;
    }
  } catch (err) {
    errEl.textContent = 'Login failed: ' + err;
    errEl.hidden = false;
  }
});

document.getElementById('login-reset-link').addEventListener('click', async (e) => {
  e.preventDefault();
  const sure = confirm(
    'Reset the panel password?\n\nThis clears the current password and signs out every ' +
    'device/browser that was signed in or remembered. You will set a new password (or skip) ' +
    'on the next screen.'
  );
  if (!sure) return;
  const errEl = document.getElementById('login-error');
  errEl.hidden = true;
  try {
    const res = await fetch('/api/auth/reset', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({confirm: true}),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = `Reset failed: ${data.error}`;
      errEl.hidden = false;
    }
  } catch (err) {
    errEl.textContent = 'Reset failed: ' + err;
    errEl.hidden = false;
  }
});
</script>
{% endblock %}
