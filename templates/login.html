{% extends "base.html" %}
{% block title %}Login — ADB Device Manager{% endblock %}
{% block body %}
<div class="login-screen">
  <form id="login-form" class="login-card" autocomplete="off">
    <h1>ADB Device Manager</h1>
    <p class="muted">Sign in with the panel password printed in the server console on first run.</p>
    <input type="password" id="login-password" name="password" placeholder="Password" autofocus required>
    <button type="submit">Sign in</button>
    <p id="login-error" class="error-text" hidden></p>
  </form>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.hidden = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password}),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = 'Incorrect password.';
      errEl.hidden = false;
    }
  } catch (err) {
    errEl.textContent = 'Login failed: ' + err;
    errEl.hidden = false;
  }
});
</script>
{% endblock %}
