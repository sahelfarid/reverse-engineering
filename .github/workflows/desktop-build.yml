name: desktop-build

# Builds the portable desktop app on each OS. PyInstaller cannot cross-compile,
# so this is one job per target OS, each running its matching spec.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: build/windows.spec
            artifact: adb-device-manager-windows
          - os: macos-latest
            spec: build/macos.spec
            artifact: adb-device-manager-macos
          - os: ubuntu-latest
            spec: build/linux.spec
            artifact: adb-device-manager-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev gir1.2-webkit2-4.1 python3-gi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build
        run: pyinstaller ${{ matrix.spec }} --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
